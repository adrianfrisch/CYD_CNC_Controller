# CYD CNC Controller — Machine Configuration
# ==============================================
# This file configures machine-specific features.
# Upload to the CYD with: pio run -t uploadfs
#
# Lines starting with # are comments and are ignored.
# Values are case-insensitive: yes/true/1 to enable, no/false/0 to disable.

# Does the machine support homing ($H)?
# Set to no if your machine has no limit switches.
HOMING=yes

