; PlatformIO Project Configuration
; CYD CNC Controller — ESP32-2432S028R
;
; Board: ESP32-2432S028R (Cheap Yellow Display)
; Display: ILI9341 320x240, resistive touch XPT2046
; Connection: UART2 to Arduino GRBL (GPIO27 TX, GPIO22 RX)

; =============================================================================
; Native Test Environment (runs on PC for unit testing)
; =============================================================================
[env:native]
platform = native
build_flags =
    -DUNIT_TEST
    -DNATIVE_BUILD
    -std=c++17
    -DUI_SCREEN_W=320
    -DUI_SCREEN_H=240
test_framework = unity
test_build_src = false
lib_compat_mode = off

; =============================================================================
; ESP32 Production Environment
; =============================================================================
[env:esp32-2432S028R]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv
board_build.filesystem = SPIFFS
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

; Libraries
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson@^7.0.0

; TFT_eSPI configuration for CYD ESP32-2432S028R
build_flags =
    -DUSER_SETUP_LOADED=1
    ; ILI9341 driver
    -DILI9341_DRIVER=1
    ; Display size
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; ESP32-2432S028R pin mapping
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; SPI frequency
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; Touch handled by XPT2046_Touchscreen library (separate SPI bus)
    ; SD card pins (HSPI)
    -DSD_CS=5
    -DSD_MOSI=23
    -DSD_MISO=19
    -DSD_SCK=18
    ; Partition scheme
    -DBOARD_HAS_PSRAM=0


