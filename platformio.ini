; PlatformIO Project Configuration
; CYD CNC Controller — ESP32-2432S028R
;
; Board: ESP32-2432S028R (Cheap Yellow Display)
; Display: ILI9341 320x240, resistive touch XPT2046
; Connection: UART2 to Arduino GRBL (GPIO27 TX, GPIO22 RX)

; =============================================================================
; Native Test Environment (runs on PC for unit testing)
; =============================================================================
[env:native]
platform = native
build_flags =
    -DUNIT_TEST
    -DNATIVE_BUILD
    -std=c++17
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
test_framework = unity
test_build_src = false
lib_compat_mode = off

; =============================================================================
; ESP32 Production Environment
; =============================================================================
[env:esp32-2432S028R]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv
board_build.filesystem = SPIFFS
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

; Libraries
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson@^7.0.0

; TFT_eSPI configuration for CYD ESP32-2432S028R
build_flags =
    -DUSER_SETUP_LOADED=1
    ; ILI9341 driver
    -DILI9341_DRIVER=1
    ; Display size
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; ESP32-2432S028R pin mapping
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; SPI frequency
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; Touch handled by XPT2046_Touchscreen library (separate SPI bus)
    ; SD card pins (HSPI)
    -DSD_CS=5
    -DSD_MOSI=23
    -DSD_MISO=19
    -DSD_SCK=18
    ; Partition scheme
    -DBOARD_HAS_PSRAM=0

; =============================================================================
; ESP32-S3 4.3" Display — ESP32-4827S043R
; Board: ESP32-4827S043R (Sunton 4.3" 480x272, RGB parallel, resistive touch)
; Display: ST7262 480x272, 16-bit RGB parallel interface (via LovyanGFX)
; Touch: XPT2046 resistive (active low CS)
; =============================================================================
[env:esp32-4827S043R]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default_8MB.csv
board_build.filesystem = SPIFFS
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB

; Libraries (LovyanGFX for RGB parallel panel support)
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson@^7.0.0

; Build flags for ESP32-4827S043R
build_flags =
    -DUSE_LOVYANGFX=1
    ; ESP32-S3 USB CDC — board uses USB-UART bridge, not native USB
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
    ; PSRAM (Octal SPI — required for RGB framebuffer)
    -DBOARD_HAS_PSRAM=1
    -DCONFIG_SPIRAM=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    ; Display size (landscape: 480x272)
    -DTFT_WIDTH=272
    -DTFT_HEIGHT=480
    ; Backlight pin
    -DTFT_BACKLIGHT_PIN=2
    ; GRBL UART — uses UART0 pins (same as USB debug serial: GPIO 43 TX, 44 RX)
    ; Serial logging is disabled when these pins match UART0 to avoid corruption
    -DGRBL_TX_PIN=43
    -DGRBL_RX_PIN=44
    -DGRBL_SHARED_SERIAL=1
    ; Touch pins (XPT2046 shares SPI bus with SD card, separate CS)
    -DTOUCH_CS_PIN=38
    -DTOUCH_IRQ_PIN=-1
    -DTOUCH_MOSI_PIN=11
    -DTOUCH_MISO_PIN=13
    -DTOUCH_CLK_PIN=12
    ; SD card pins (SPI)
    -DSD_CS_PIN=10
    -DSD_MOSI_PIN=11
    -DSD_MISO_PIN=13
    -DSD_SCK_PIN=12
    ; Fonts (LovyanGFX compatible)
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; =============================================================================
; ESP32-S3 7.0" Display — ESP32-8048S070C
; Board: ESP32-8048S070C (Sunton 7" 800x480, RGB parallel, capacitive touch)
; Display: 800x480, 16-bit RGB parallel interface (via LovyanGFX)
; Touch: GT911 capacitive (I2C)
; =============================================================================
[env:esp32-8048S070C]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.partitions = default_16MB.csv
board_build.filesystem = SPIFFS
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; Libraries (LovyanGFX for RGB parallel panel support)
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson@^7.0.0

; Build flags for ESP32-8048S070C
build_flags =
    -DUSE_LOVYANGFX=1
    -DLGFX_8048S070=1
    ; ESP32-S3 USB CDC
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
    ; PSRAM (Octal SPI — required for RGB framebuffer)
    -DBOARD_HAS_PSRAM=1
    -DCONFIG_SPIRAM=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    ; Display size (landscape: 800x480)
    -DTFT_WIDTH=480
    -DTFT_HEIGHT=800
    ; Backlight pin
    -DTFT_BACKLIGHT_PIN=2
    ; GRBL UART — uses UART0 pins (GPIO 43 TX, 44 RX)
    -DGRBL_TX_PIN=43
    -DGRBL_RX_PIN=44
    ; NOTE: GRBL_SHARED_SERIAL intentionally NOT defined here for debugging.
    ; Define -DGRBL_SHARED_SERIAL=1 when GRBL is connected to UART0.
    ; GT911 capacitive touch (I2C)
    -DUSE_GT911_TOUCH=1
    -DGT911_SDA_PIN=19
    -DGT911_SCL_PIN=20
    -DGT911_INT_PIN=18
    -DGT911_RST_PIN=38
    ; SD card pins (SPI)
    -DSD_CS_PIN=10
    -DSD_MOSI_PIN=11
    -DSD_MISO_PIN=13
    -DSD_SCK_PIN=12
    ; Fonts (LovyanGFX compatible)
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1





